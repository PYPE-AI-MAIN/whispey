sonar.projectKey=Whispey
sonar.projectName=Whispey

sonar.sources=src
sonar.tests=__tests__

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.scm.disabled=true

# Files not scanned at all — generated, vendored, or type-only
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/components/ui/**,\
  **/types/**,\
  **/*.stories.*,\
  **/app/docs/**

# Coverage exclusions — broad categories only, never individual file names.
# Sonar reads lcov.info for coverage data. Files not in lcov.info are simply
# not measured. These exclusions only need to cover whole directories of code
# that is untestable by nature (browser runtime, React state, DB clients).
# When adding a new untestable CATEGORY (e.g. src/workers/), add it here.
# Never add individual file names — manage those in vitest.config.ts instead.
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/app/**,\
  **/components/**,\
  **/hooks/**,\
  **/stores/**,\
  **/contexts/**,\
  **/server/**,\
  **/config/**
