sonar.projectKey=Whispey
sonar.projectName=Whispey

sonar.sources=src
sonar.tests=__tests__

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Disable SCM blame to significantly reduce report size
sonar.scm.disabled=true

# ── Source exclusions (not scanned at all) ────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/components/ui/**,\
  **/types/**,\
  **/*.stories.*,\
  **/app/docs/**

# ── Coverage exclusions ───────────────────────────────────────────────────────
# Mirrors vitest.config.ts coverage.exclude so both tools measure the same files.
# Rule: exclude anything that is infrastructure, framework-generated, or
# requires integration/E2E testing rather than unit testing.
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/node_modules/**,\
  **/.next/**,\
  \
  **/app/**,\
  \
  **/components/**,\
  \
  **/hooks/**,\
  \
  **/stores/**,\
  **/contexts/**,\
  \
  **/server/**,\
  \
  **/config/**,\
  \
  **/middleware.ts,\
  \
  **/lib/adapters/types.ts,\
  **/lib/supabase-query-types.ts,\
  **/lib/supabase-server.ts,\
  **/lib/supabase-select-auth.ts,\
  **/lib/supabase-select-client.ts,\
  **/lib/auth.ts,\
  **/lib/prod-auth.ts,\
  **/lib/user-data.ts,\
  **/lib/sendInviteEmail.ts,\
  **/lib/webhook-trigger.ts,\
  **/lib/getProjectRoleForApi.ts,\
  **/lib/calculateCost.ts,\
  **/lib/github-prompts.ts,\
  **/lib/source.ts,\
  \
  **/utils/verifyDistinctConfig.ts,\
  **/utils/constants.ts,\
  **/utils/campaigns/**,\
  **/utils/spanUtils.ts
