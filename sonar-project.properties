sonar.projectKey=Whispey
sonar.projectName=Whispey

sonar.sources=src
sonar.tests=__tests__

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.scm.disabled=true

# Files not scanned at all — generated, vendored, or type-only
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/components/ui/**,\
  **/types/**,\
  **/*.stories.*,\
  **/app/docs/**

# Coverage exclusions — mirrors vitest.config.ts coverage.exclude exactly.
# Anything here is excluded from the coverage % denominator in Sonar.
# Rule: exclude code that requires browser, real DB, or Clerk/Supabase to run.
sonar.coverage.exclusions=\
  **/__tests__/**,\
  **/node_modules/**,\
  **/.next/**,\
  **/app/**,\
  **/components/**,\
  **/hooks/**,\
  **/stores/**,\
  **/contexts/**,\
  **/server/**,\
  **/config/**,\
  **/middleware.ts,\
  **/lib/adapters/types.ts,\
  **/lib/supabase-query-types.ts,\
  **/lib/supabase-server.ts,\
  **/lib/supabase-select-auth.ts,\
  **/lib/supabase-select-client.ts,\
  **/lib/auth.ts,\
  **/lib/prod-auth.ts,\
  **/lib/user-data.ts,\
  **/lib/sendInviteEmail.ts,\
  **/lib/webhook-trigger.ts,\
  **/lib/getProjectRoleForApi.ts,\
  **/lib/calculateCost.ts,\
  **/lib/github-prompts.ts,\
  **/lib/source.ts,\
  **/utils/verifyDistinctConfig.ts,\
  **/utils/constants.ts,\
  **/utils/campaigns/**,\
  **/utils/spanUtils.ts
